<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}AI Config Manager{% endblock %}</title>
  {% load static %}
  <link rel="icon" type="image/svg+xml" href="{% static 'images/favicon.svg' %}" />
  <link rel="icon" type="image/png" sizes="32x32" href="{% static 'images/favicon.svg' %}" />
  <link rel="apple-touch-icon" sizes="180x180" href="{% static 'images/favicon.svg' %}" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
  <header class="bg-white border-b border-slate-200">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="{% url 'provider_index' %}" class="flex items-center gap-3 group">
        <img src="{% static 'images/logo.svg' %}" alt="AI Config Manager" class="h-10 transition-transform group-hover:scale-105" />
      </a>
      <nav class="flex items-center gap-4 text-sm">
        <a href="{% url 'provider_index' %}" class="{% if request.resolver_match.url_name == 'provider_index' or request.resolver_match.url_name == 'provider_detail' %}text-indigo-600{% else %}text-slate-600 hover:text-slate-900{% endif %}">Providers</a>
        <a href="{% url 'sessions' %}" class="{% if request.resolver_match.url_name == 'sessions' or request.resolver_match.url_name == 'session_detail' %}text-indigo-600{% else %}text-slate-600 hover:text-slate-900{% endif %}">Sessions</a>
        <a href="{% url 'extensions' %}" class="{% if request.resolver_match.url_name == 'extensions' %}text-indigo-600{% else %}text-slate-600 hover:text-slate-900{% endif %}">Extensions</a>
        <a href="{% url 'settings' %}" class="{% if request.resolver_match.url_name == 'settings' %}text-indigo-600{% else %}text-slate-600 hover:text-slate-900{% endif %}">Settings</a>
      </nav>
    </div>
  </header>

  {% if messages %}
    <div class="max-w-6xl mx-auto px-6 mt-4 space-y-2">
      {% for m in messages %}
        <div class="px-4 py-2 rounded-md text-sm {% if m.tags == 'error' %}bg-red-50 text-red-700 border border-red-200{% elif m.tags == 'success' %}bg-emerald-50 text-emerald-700 border border-emerald-200{% else %}bg-slate-100 text-slate-700 border border-slate-200{% endif %}">
          {{ m }}
        </div>
      {% endfor %}
    </div>
  {% endif %}

  <main class="max-w-6xl mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>

  <footer class="max-w-6xl mx-auto px-6 py-8 text-xs text-slate-400">
    Backups disimpan di samping file aslinya dengan suffix <span class="mono">.bak.&lt;timestamp&gt;</span>.
  </footer>
</body>
</html>
