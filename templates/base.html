<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}AI Config Manager{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
  <header class="bg-white border-b border-slate-200">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="{% url 'provider_index' %}" class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-indigo-500 to-violet-600 flex items-center justify-center text-white font-bold">AI</div>
        <div>
          <div class="font-semibold text-slate-900">AI Config Manager</div>
          <div class="text-xs text-slate-500">Manage settings.json across AI providers</div>
        </div>
      </a>
      <nav class="flex items-center gap-4 text-sm">
        <a href="{% url 'provider_index' %}" class="text-indigo-600 hover:underline">Providers</a>
        <a href="{% url 'settings' %}" class="text-slate-600 hover:text-slate-900">Settings</a>
      </nav>
    </div>
  </header>

  {% if messages %}
    <div class="max-w-6xl mx-auto px-6 mt-4 space-y-2">
      {% for m in messages %}
        <div class="px-4 py-2 rounded-md text-sm {% if m.tags == 'error' %}bg-red-50 text-red-700 border border-red-200{% elif m.tags == 'success' %}bg-emerald-50 text-emerald-700 border border-emerald-200{% else %}bg-slate-100 text-slate-700 border border-slate-200{% endif %}">
          {{ m }}
        </div>
      {% endfor %}
    </div>
  {% endif %}

  <main class="max-w-6xl mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>

  <footer class="max-w-6xl mx-auto px-6 py-8 text-xs text-slate-400">
    Backups disimpan di samping file aslinya dengan suffix <span class="mono">.bak.&lt;timestamp&gt;</span>.
  </footer>
</body>
</html>
